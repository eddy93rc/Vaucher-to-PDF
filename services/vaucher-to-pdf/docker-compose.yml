services:
  voucher-pdf:
    build: .
    container_name: voucher-pdf-generator
    ports:
      - "9110:9110"
    environment:
      - PORT=9110
      - ASSETS_PATH=/app/assets
      - TEMPLATES_PATH=/app/templates
      - OUTPUT_PATH=/app/output
      - LOG_LEVEL=info
      - MONDAY_API_KEY=${MONDAY_API_KEY}
      - MONDAY_BOARD_ID=${MONDAY_BOARD_ID:-18403483965}
      - MONDAY_VOUCHER_PDF_COLUMN_ID=${MONDAY_VOUCHER_PDF_COLUMN_ID:-file_mm1h5b78}
    volumes:
      - ./output:/app/output
    restart: unless-stopped
